name: guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: mise run install
      - name: Check changeset status
        if: github.event_name == 'pull_request'
        run: mise x -- bun run check:changesets
      - name: Run repository checks
        run: mise run check
  cross-platform-paths:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
      - name: Install dependencies
        run: mise run install
      - name: Build declarations
        run: bun run build:declarations
      - name: Run cross-platform path tests
        run: bun test packages/store/src/tests/paths.test.ts packages/adapters/src/codex/tests/index.test.ts packages/adapters/src/opencode/tests/index.test.ts packages/adapters/src/claude-code/tests/index.test.ts packages/adapters/src/pi/tests/index.test.ts packages/sessions/src/tests/sessions.test.ts
