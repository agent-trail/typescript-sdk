[tools]
bun = "1.3.14"
"aqua:jdx/hk" = "1.48.0"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:zizmorcore/zizmor" = "1.25.2"

[tasks.setup]
description = "Install tools and configure Git hooks"
depends = ["hooks:install"]

[tasks."hooks:install"]
description = "Install hk Git hooks"
run = "hk install"

[tasks.check]
description = "Run all repository checks"
run = """
bun install --frozen-lockfile
bun run check
if [ -d .github/workflows ]; then actionlint && zizmor .github/workflows; else echo 'No GitHub Actions workflows configured.'; fi
"""

[tasks.install]
description = "Install Bun dependencies with lockfile enforcement"
run = "bun install --frozen-lockfile"

[tasks.lint]
description = "Run project lint gates"
run = """
bun run check:biome
bun run check:types
bun run check:fallow
"""

[tasks."check:biome"]
description = "Run Biome checks"
run = "bun run check:biome"

[tasks."check:types"]
description = "Run TypeScript checks"
run = "bun run check:types"

[tasks."check:fallow"]
description = "Run Fallow checks"
run = "bun run check:fallow"

[tasks.test]
description = "Run tests for this repository"
run = "bun run test"

[tasks."check:actions"]
description = "Validate GitHub Actions workflows"
run = "if [ -d .github/workflows ]; then actionlint && zizmor .github/workflows; else echo 'No GitHub Actions workflows configured.'; fi"
